<!DOCTYPE html>
<html>
 <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <link rel="stylesheet" href="./trail.css" data-n-g="" />
  <script src="./jq.js" ></script>
  <script src="./auth.js" ></script>
  <script src="./popup.js" ></script>
  <noscript data-n-css=""></noscript>
    <title>WebTrailAI</title>
 </head>
  <body>
    <div id="app">
        <p class="header">WebTrailAI</p>
        <div class="container">
            <main class="main">
                <ul class="nav">
                   <li id="login-nav-item">您好 请： <button id="login-btn">登录/注册</button></li>
                   <li id="user-nav-item" style="display: none;"><span id="welcome-text">用户 , 欢迎您</span><button id="logout-btn">退出</button></li>
                   <li id="history-nav-item" style="display: none;"><button id="history-btn">每日总结</button></li>
                </ul>
                <div class="history-summary" style="display: none;">
                    <ul id="summary-list"></ul>
                </div>
               <div class="content" id="content">
                    <ul id="history-list"></ul>
               </div>
            </main>
            
           
        </div>
         <footer class="footer">
                <button id="clear-all-btn" style="display: none;">清空今日浏览历史（谨慎操作）</button>
            </footer>
    </div>


    <div class="login-box" id="login-box">
        <div class="login-content">
            <span class="close-btn" id="login-close-btn">&times;</span>
            <div class="login-header">
                <div class="login-icon">🔐</div>
                <h2 id="auth-title">用户登录</h2>
                <p class="login-subtitle" id="auth-subtitle">请输入您的账号信息</p>
            </div>
            <div class="login-form">
                <div class="auth-mode-switch">
                    <button type="button" class="auth-mode-btn active" data-mode="login">登录</button>
                    <button type="button" class="auth-mode-btn" data-mode="register">注册</button>
                </div>
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="login-username" placeholder="请输入用户名" />
                </div>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="login-password" placeholder="请输入密码" />
                </div>
                <div class="auth-message auth-error" id="auth-error" style="display:none;"></div>
                <div class="auth-message auth-success" id="auth-success" style="display:none;"></div>
                <button class="login-submit" id="auth-submit-btn">立即登录</button>
              
            </div>
        </div>
    </div>

  </body>
</html>
