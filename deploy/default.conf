# 定义一个 nginx 虚拟主机，用来接收外部 HTTP 请求。
server {
    # 监听容器内 80 端口；宿主机端口通过 docker run -p 映射进来。
    listen 80;

    # 使用通配 server_name，表示不限制访问域名，任何 Host 都能进这个服务。
    server_name _;

    # 所有路径都转发给后端 Go 服务，目前项目没有单独托管静态前端。
    location / {
        # 把原始 Host 头传给后端，方便后端识别请求来源。
        proxy_set_header Host $http_host;

        # 把客户端真实 IP 传给后端，后续如需日志审计可以使用。
        proxy_set_header X-Real-IP $remote_addr;

        # 追加代理链路 IP，保留经过多层代理时的完整来源信息。
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 告诉后端原始请求协议是 http 还是 https。
        proxy_set_header X-Forwarded-Proto $scheme;

        # 连接后端超过 6000 秒还没连上，就认为后端不可用。
        proxy_connect_timeout 6000s;

        # 等待后端响应最多 6000 秒；summary 等接口可能比普通请求稍慢。
        proxy_read_timeout 6000s;

        # 向后端发送请求最多等待 6000 秒，避免慢连接无限占用资源。
        proxy_send_timeout 6000s;

        # 把请求转发到容器内部 Go 服务监听的 3459 端口。
        proxy_pass http://127.0.0.1:3459;
    }
}
